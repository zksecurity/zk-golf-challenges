  content:
    title: SHA-256
    description: "# SHA-256 Digest\nYour goal is to build a circuit that accepts a\
      \ message of up to 256 bytes and\noutputs its SHA-256 digest.\n\n## Interface\n\
      \n```lean\n@[reducible] def inputBufferLen : \u2115 := 256\n\nstructure Input\
      \ (F : Type) where\n  message : Vector F inputBufferLen\n  messageLen : F\n\n\
      structure Output (F : Type) where\n  digest : Vector F 8\n```\n\nThe input is\
      \ a fixed-size buffer of field elements, together with the\nlength of the message\
      \ prefix that should be hashed. The SHA-256 must be computed\non the input slice\
      \ starting from position 0 with size `messageLen`.\nThe output is an array of\
      \ 8 field elements, each representing one\n32-bit word of the digest.\n\nThe\
      \ input assumptions say that every element of the message buffer\nis a byte\
      \ and that `messageLen` is strictly less than the buffer length.\nThese properties\
      \ are assumed to be checked elsewhere (e.g., by the caller of the\ncircuit)\
      \ and do not have to be enforced by the circuit itself.\n\n```lean\ndef Assumptions\
      \ {bufferLen : \u2115}\n    (input : Vector \u2115 bufferLen)\n    (len : \u2115\
      ) : Prop :=\n  IsByteArray input \u2227 len < bufferLen\n```\n\nThe circuit\
      \ must guarantee that the output is the SHA-256 hash of the\nfirst `messageLen`\
      \ bytes of the input buffer.\n\n```lean\ndef Spec {bufferLen : \u2115}\n   \
      \ (input : Vector \u2115 bufferLen) (len : \u2115)\n    (output : Vector \u2115\
      \ 8) : Prop :=\n  if h : len \u2264 bufferLen then\n    let truncated := truncate\
      \ input len h\n    output = sha256 truncated\n  else\n    False\n```\n"
    tags:
    - hash
    - sha256
  baseline:
    allocations: 204224
    constraints: 209586
  comparison_points:
  - name: zk-email
    score: 313655
    caveats: "This estimate is taken from the `Sha256Bytes(320)` template of zk-email.\n\
      It is a dynamic-length, 5-block SHA-256 circuit for a 320-bytes pre-padded buffer.\n\
      It is the most direct comparison to the challenge interface.\n\nThe cost is\
      \ 155885 allocations and 157770 constraints, when compiled with circom using\
      \ `--O2`.\n\nThe main interface differences between the challenge and `Sha256Bytes(320)`\
      \ are:\n- The challenge requires the circuit to enforce the correct padding\
      \ of the input message, while\n  `Sha256Bytes(320)` takes a pre-padded buffer\
      \ in input, and assumes that the padding is correct.\n- The `Sha256Bytes(320)`\
      \ circuit enforces internally that the input message is composed of bytes, while\
      \ the\n  challenge assumes that the input is a valid byte array and does not\
      \ enforce it.\n- The `Sha256Bytes(320)` circuit additionally enforces that the\
      \ bytes after the padded length are zero, while\n  the challenge does not enforce\
      \ this property, but simply ignores the bytes after the padded length.\n- The\
      \ `Sha256Bytes(320)` circuit enforces that the padded length is in bounds, while\
      \ the challenge assumes it.\n- In this estimate we are counting the allocation\
      \ of the input variables, while in the challenge we\n  are not counting them,\
      \ since they are allocated by the caller.\n  This underestimates the challenge\
      \ cost by 321 allocations.\n"
  - name: circomlib
    score: 305565
    caveats: "Since circomlib does not provide a direct implementation of the full\
      \ SHA-256 function with dynamic length,\n**this estimate is a rough lower bound**\
      \ obtained by multiplying the cost of the circomlib's\n`Sha256compression()`\
      \ template by 5.\n\nEach compression costs 30328 allocations and 30785 constraints,\
      \ when compiled with circom using `--O2`.\n\nA few caveats to consider:\n- The\
      \ challenge is requiring the circuit to enforce the correct padding of the input\
      \ message, while this\n  estimate only considers compressions.\n- We are counting\
      \ allocations for the input variables, while in the challenge score we are not\
      \ counting them,\n  since they are allocated by the caller. This slightly underestimates\
      \ the challenge cost.\n- We are slightly overestimating the allocations by multiplying\
      \ the raw compression cost by 5,\n  since in a MD compression chan, internal\
      \ state variables would be reused between compressions.\n"
  - name: xJsnark
    score: 255380
    caveats: "This estimate is a rough lower bound obtained by multiplying the published\
      \ cost of 25538 constraints for\nSHA-256 compression from the paper by 10, assuming\
      \ 5 compressions instantiations\nand the number of allocations equal the number\
      \ of constraints.\n\nA few caveats to consider:\n- The challenge is requiring\
      \ the circuit to enforce the correct padding of the input message, while this\n\
      \  estimate only considers compressions.\n- We are counting allocations for\
      \ the input variables, while in the challenge score we are not counting them,\n\
      \  since they are allocated by the caller. This slightly underestimates the\
      \ challenge cost.\n- We are slightly overestimating the allocations by multiplying\
      \ the raw compression cost by 5,\n  since in a MD compression chan, internal\
      \ state variables would be reused between compressions.\n"
