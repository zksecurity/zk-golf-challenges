  content:
    title: Hello, World!
    description: "# Byte Array Assertion\nThis challenge is meant to be an introduction\
      \ to zkGolf: your goal is to build\na circuit that accepts an array of 16 field\
      \ elements and asserts that every element is a byte.\n\n## Interface\n\n```lean\n\
      @[reducible] def bufferLen : \u2115 := 16\n\nstructure Input (F : Type) where\n\
      \  buffer : Vector F bufferLen\n\n@[reducible] def Output : TypeMap := unit\n\
      ```\n\nThere are no public-input assumptions.\nThe circuit must guarantee that\
      \ every element in the buffer is less than 256.\n\n```lean\ndef Spec (input\
      \ : Input (F circomPrime))\n    (_output : Output (F circomPrime))\n    (_data\
      \ : ProverData (F circomPrime)) : Prop :=\n  \u2200 i : Fin bufferLen, (input.buffer[i.val]'i.isLt).val\
      \ < 256\n```\n\n**Note:** we do not expect anyone to improve the baseline circuit,\
      \ but you can use\nthis challenge to test your setup.\n"
    tags:
    - hello-world
  baseline:
    allocations: 128
    constraints: 144
