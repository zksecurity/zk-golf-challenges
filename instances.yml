  - Solution/AssertBytes
  content:
    title: Hello, World!
    description: "# Byte Array Assertion\nThis challenge is meant to be an introduction\
      \ to zkGolf: your goal is to build\na circuit that accepts an array of 16 field\
      \ elements and asserts that every element is a byte.\n\n## Interface\n\n```lean\n\
      @[reducible] def bufferLen : \u2115 := 16\n\nstructure Input (F : Type) where\n\
      \  buffer : Vector F bufferLen\n\n@[reducible] def Output : TypeMap := unit\n\
      ```\n\nThere are no public-input assumptions.\nThe circuit must guarantee that\
      \ every element in the buffer is less than 256.\n\n```lean\ndef Spec (input\
      \ : Input (F circomPrime))\n    (_output : Output (F circomPrime))\n    (_data\
      \ : ProverData (F circomPrime)) : Prop :=\n  \u2200 i : Fin bufferLen, (input.buffer[i.val]'i.isLt).val\
      \ < 256\n```\n\n**Note:** we do not expect anyone to improve the baseline circuit,\
      \ but you can use\nthis challenge to test your setup.\n"
    tags:
    - hello-world
  baseline:
    allocations: 128
    constraints: 144
sha256-hash:
  type: public
  instance: SHA256
  config: configs/SHA256.json
  cost: Challenge/Instances/SHA256/Cost.lean
  namespace: Solution.SHA256
  files:
  - configs/SHA256.json
  - Challenge/Specs/SHA256.lean
  - Challenge/Utils/CostR1CS.lean
  - Challenge/Instances/SHA256
  - Solution/SHA256
  - Tests/SHA256.lean
  content:
    title: SHA-256
    description: "# SHA-256 Digest\nYour goal is to build a circuit that accepts a\
      \ message of up to 256 bytes and\noutputs its SHA-256 digest.\n\n## Interface\n\
      \n```lean\n@[reducible] def inputBufferLen : \u2115 := 256\n\nstructure Input\
      \ (F : Type) where\n  message : Vector F inputBufferLen\n  messageLen : F\n\n\
      structure Output (F : Type) where\n  digest : Vector F 8\n```\n\nThe input is\
      \ a fixed-size buffer of field elements, together with the\nlength of the message\
      \ prefix that should be hashed. The SHA-256 must be computed\non the input slice\
      \ starting from position 0 with size `messageLen`.\nThe output is an array of\
      \ 8 field elements, each representing one\n32-bit word of the digest.\n\nThe\
      \ input assumptions say that every element of the message buffer\nis a byte\
      \ and that `messageLen` is strictly less than the buffer length.\nThese properties\
      \ are assumed to be checked elsewhere (e.g., by the caller of the\ncircuit)\
      \ and do not have to be enforced by the circuit itself.\n\n```lean\ndef Assumptions\
      \ {bufferLen : \u2115}\n    (input : Vector \u2115 bufferLen)\n    (len : \u2115\
      ) : Prop :=\n  IsByteArray input \u2227 len < bufferLen\n```\n\nThe circuit\
      \ must guarantee that the output is the SHA-256 hash of the\nfirst `messageLen`\
      \ bytes of the input buffer.\n\n```lean\ndef Spec {bufferLen : \u2115}\n   \
      \ (input : Vector \u2115 bufferLen) (len : \u2115)\n    (output : Vector \u2115\
      \ 8) : Prop :=\n  if h : len \u2264 bufferLen then\n    let truncated := truncate\
      \ input len h\n    output = sha256 truncated\n  else\n    False\n```\n"
    tags:
    - hash
    - sha256
  baseline:
    allocations: 204224
    constraints: 209586
  comparison_points:
  - name: zk-email
    score: 313655
    caveats: "This estimate is taken from the `Sha256Bytes(320)` template of zk-email.\n\
      It is a dynamic-length, 5-block SHA-256 circuit for a 320-bytes pre-padded buffer.\n\
      It is the most direct comparison to the challenge interface.\n\nThe cost is\
      \ 155885 allocations and 157770 constraints, when compiled with circom using\
      \ `--O2`.\n\nThe main interface differences between the challenge and `Sha256Bytes(320)`\
      \ are:\n- The challenge requires the circuit to enforce the correct padding\
      \ of the input message, while\n  `Sha256Bytes(320)` takes a pre-padded buffer\
      \ in input, and assumes that the padding is correct.\n- The `Sha256Bytes(320)`\
      \ circuit enforces internally that the input message is composed of bytes, while\
      \ the\n  challenge assumes that the input is a valid byte array and does not\
      \ enforce it.\n- The `Sha256Bytes(320)` circuit additionally enforces that the\
      \ bytes after the padded length are zero, while\n  the challenge does not enforce\
      \ this property, but simply ignores the bytes after the padded length.\n- The\
      \ `Sha256Bytes(320)` circuit enforces that the padded length is in bounds, while\
      \ the challenge assumes it.\n- In this estimate we are counting the allocation\
      \ of the input variables, while in the challenge we\n  are not counting them,\
      \ since they are allocated by the caller.\n  This underestimates the challenge\
      \ cost by 321 allocations.\n"
  - name: circomlib
    score: 305565
    caveats: "Since circomlib does not provide a direct implementation of the full\
      \ SHA-256 function with dynamic length,\n**this estimate is a rough lower bound**\
      \ obtained by multiplying the cost of the circomlib's\n`Sha256compression()`\
      \ template by 5.\n\nEach compression costs 30328 allocations and 30785 constraints,\
      \ when compiled with circom using `--O2`.\n\nA few caveats to consider:\n- The\
      \ challenge is requiring the circuit to enforce the correct padding of the input\
      \ message, while this\n  estimate only considers compressions.\n- We are counting\
      \ allocations for the input variables, while in the challenge score we are not\
      \ counting them,\n  since they are allocated by the caller. This slightly underestimates\
      \ the challenge cost.\n- We are slightly overestimating the allocations by multiplying\
      \ the raw compression cost by 5,\n  since in a MD compression chan, internal\
      \ state variables would be reused between compressions.\n"
  - name: xJsnark
    score: 255380
    caveats: "This estimate is a rough lower bound obtained by multiplying the published\
      \ cost of 25538 constraints for\nSHA-256 compression from the paper by 10, assuming\
      \ 5 compressions instantiations\nand the number of allocations equal the number\
      \ of constraints.\n\nA few caveats to consider:\n- The challenge is requiring\
      \ the circuit to enforce the correct padding of the input message, while this\n\
      \  estimate only considers compressions.\n- We are counting allocations for\
      \ the input variables, while in the challenge score we are not counting them,\n\
      \  since they are allocated by the caller. This slightly underestimates the\
      \ challenge cost.\n- We are slightly overestimating the allocations by multiplying\
      \ the raw compression cost by 5,\n  since in a MD compression chan, internal\
      \ state variables would be reused between compressions.\n"
keccak-f1600:
  type: public
  instance: KeccakF1600
  config: configs/KeccakF1600.json
  cost: Challenge/Instances/KeccakF1600/Cost.lean
  namespace: Solution.KeccakF1600
  files:
  - configs/KeccakF1600.json
  - Challenge/Specs/Keccak.lean
  - Challenge/Utils/CostR1CS.lean
  - Challenge/Instances/KeccakF1600
  - Solution/KeccakF1600
  - Tests/Keccak.lean
  content:
    title: Keccak-f[1600] Permutation
    description: "# Keccak-f[1600] Permutation\nYour goal is to build a circuit that\
      \ applies the Keccak-f[1600]\npermutation (the SHA-3 permutation, FIPS 202)\
      \ to a 1600-bit state.\n\n## Interface\n\n```lean\n@[reducible] def stateBitsLen\
      \ : \u2115 := 1600\n\nstructure Input (F : Type) where\n  state : Vector F stateBitsLen\n\
      \nstructure Output (F : Type) where\n  state : Vector F stateBitsLen\n```\n\n\
      The input is the state as a 1600-bit string, one bit per field element,\nwith\
      \ bit `64\xB7(x + 5y) + z` holding bit `z` of the lane at coordinates\n`(x,\
      \ y)` (FIPS 202, Section 3.1.2). The output is the permuted state in\nthe same\
      \ encoding.\n\nThe input assumptions say that every element of the state is\
      \ a bit.\nThis property is assumed to be checked elsewhere (e.g., by the caller\
      \ of\nthe circuit) and does not have to be enforced by the circuit itself.\n\
      \n```lean\n@[reducible] def IsBitString {n : \u2115} (xs : Vector \u2115 n)\
      \ : Prop :=\n  \u2200 i : Fin n, xs[i] < 2\n\ndef Assumptions (input : Vector\
      \ \u2115 1600) : Prop :=\n  IsBitString input\n```\n\nThe circuit must guarantee\
      \ that the output is the Keccak-f[1600]\npermutation of the input state: 24\
      \ rounds of \u03B8, \u03C1, \u03C0, \u03C7, \u03B9 as specified\nin `Specs.Keccak`.\n\
      \n```lean\ndef Spec (input : Vector \u2115 1600) (output : Vector \u2115 1600)\
      \ : Prop :=\n  output = keccakF1600 input\n```\n"
    tags:
    - permutation
    - keccak
    - sha3
  baseline:
    allocations: 153600
    constraints: 153600
  comparison_points:
  - name: vocdoni/keccak256-circom
    score: 307200
    caveats: "The de-facto reference pure-R1CS Keccak implementation in Circom, and\
      \ the\nclosest apples-to-apples comparison to the challenge. The score is the\
      \ bare\nKeccak-f[1600] permutation: its `Keccakf()` template takes 1600 free\
      \ input\nbits and returns 1600 output bits, exactly the challenge interface\
      \ (no\npadding, absorb, or squeeze).\n\nCompiled at commit `af3e898` with the\
      \ circom 2.x compiler and `--O2`,\n`Keccakf()` reports 153600 non-linear constraints\
      \ and 155201 wires.\nExcluding the constant wire and the 1600 caller-provided\
      \ input signals,\nthat is 153600 allocations and 153600 constraints, landing\
      \ exactly on the\nbaseline.\n\nA few caveats to consider:\n- The repo's headline\
      \ \"\u2248150848 constraints\" (its README) is a full\n  Keccak-256 hash of\
      \ a 32-byte input, not the permutation. That circuit\n  absorbs a short message\
      \ into an all-zero state, so the compiler folds\n  away much of the first round;\
      \ the free-input permutation cannot, which is\n  why it is slightly larger (153600\
      \ vs 150848).\n- As in the challenge, \u03C1 and \u03C0 are pure rewiring (0\
      \ constraints), \u03B8 and \u03B9\n  are linear, and \u03C7 is the only essential\
      \ nonlinearity (one AND per bit).\n- We do not count the 1600 input signals\
      \ as allocations, since in the\n  challenge they are allocated by the caller.\n"
rsa-pkcs1v15-sha256-4096-65537:
  type: public
  instance: RSASSAPKCS1v15_SHA256_4096_65537
  config: configs/RSASSAPKCS1v15_SHA256_4096_65537.json
  cost: Challenge/Instances/RSASSAPKCS1v15_SHA256_4096_65537/Cost.lean
  namespace: Solution.RSASSAPKCS1v15_SHA256_4096_65537
  files:
  - configs/RSASSAPKCS1v15_SHA256_4096_65537.json
  - Challenge/Specs/RSASSAPKCS1v15.lean
  - Challenge/Utils/CostR1CS.lean
  - Challenge/Instances/RSASSAPKCS1v15_SHA256_4096_65537
  - Solution/RSASSAPKCS1v15_SHA256_4096_65537
  - Tests/RSA2048.lean
  content:
    title: RSA Signature Verification
    description: "# RSA-4096 PKCS#1 v1.5 SHA-256 Verification\nYour goal is to build\
      \ a circuit that verifies an RSASSA-PKCS1-v1_5\nsignature over a SHA-256 digest,\
      \ using a 4096-bit RSA modulus and public\nexponent `65537`.\n\n## Interface\n\
      \n```lean\n@[reducible] def modulusBytesLen : \u2115 :=\n  Specs.RSASSAPKCS1v15_SHA256_4096_65537.modulusBytesLen\n\
      \n@[reducible] def digestBytesLen : \u2115 :=\n  Specs.RSASSAPKCS1v15.HashAlgorithm.sha256.digestLength\n\
      \nstructure Input (F : Type) where\n  modulus : Vector F modulusBytesLen\n \
      \ digest : Vector F digestBytesLen\n  signature : Vector F modulusBytesLen\n\
      \nabbrev Output : TypeMap := unit\n```\n\nThe public inputs are byte strings\
      \ encoded as field elements: the\nbig-endian RSA modulus `N`, the 32-byte SHA-256\
      \ digest, and the big-endian\nRSA signature `S`.\n\nThe assumptions say that\
      \ all three vectors are valid byte arrays, and that\nthe representative integer\
      \ of the modulus has exactly 4096 bits.\nThese properties are assumed to be\
      \ checked elsewhere (e.g., by the caller\nof the circuit) and do not have to\
      \ be enforced by the circuit itself.\n\n```lean\ndef Assumptions {modulusBytesLen\
      \ : \u2115} (alg : HashAlgorithm)\n    (n : Vector \u2115 modulusBytesLen)\n\
      \    (h : Vector \u2115 alg.digestLength)\n    (signature : Vector \u2115 modulusBytesLen)\
      \ : Prop :=\n  IsOctetString n \u2227\n  IsOctetString h \u2227\n  IsOctetString\
      \ signature \u2227\n  HasBitSize (os2ip n) (modulusBytesLen * 8)\n```\n\nThe\
      \ circuit must guarantee that RFC 8017 signature verification succeeds:\nrecover\
      \ `S^65537 mod N`, encode it as a 4096-bit octet string, and compare\nit with\
      \ the EMSA-PKCS1-v1_5 encoding of the supplied SHA-256 digest.\n\n```lean\n\
      def verifySignature {modulusBytesLen : \u2115} (alg : HashAlgorithm) (e : \u2115\
      )\n    (n : Vector \u2115 modulusBytesLen)\n    (h : Vector \u2115 alg.digestLength)\n\
      \    (signature : Vector \u2115 modulusBytesLen) : Bool :=\n  let n := os2ip\
      \ n\n  let signature := os2ip signature\n  let recovered := rsavp1? n e signature\n\
      \  let expected := emsaPkcs1v15Encode? alg h modulusBytesLen\n  match recovered,\
      \ expected with\n  | some r, some e => i2osp r modulusBytesLen == some e\n \
      \ | _, _ => false\n```\n\nThe concrete instance fixes SHA-256 as the hash algorithm\
      \ and `65537` as\nthe public exponent.\n\n```lean\n@[reducible] def publicExponent\
      \ := 65537\n\ndef Spec :=\n  Specs.RSASSAPKCS1v15.Spec\n    (modulusBytesLen\
      \ := modulusBytesLen)\n    algorithm\n    publicExponent\n```\n"
    tags:
    - rsa
    - signature
  baseline:
    allocations: 412130
    constraints: 415006
  comparison_points:
  - name: zk-email
    score: 752852
    caveats: "This estimate is taken from the `RSAVerifier65537(121, 34)` template\
      \ of zk-email.\nIt is an RSAPSS verification template, and it is the most direct\
      \ comparison to the challenge interface.\n\nThe cost is 375525 allocations and\
      \ 377327 constraints, when compiled with circom using `--O2`.\n\nThe main interface\
      \ differences between the challenge and `RSAVerifier65537(121, 34)` are:\n-\
      \ The challenge requires both the input message digest and the modulus to be\
      \ provided as byte arrays,\n  while `RSAVerifier65537(121, 34)` takes them directly\
      \ as big integers.\n- The `RSAVerifier65537(121, 34)` circuit enforces internally\
      \ that the input message and the modulus are normalized\n  big integers, while\
      \ the challenge assumes that they are valid byte arrays and does not enforce\
      \ it.\n- In this estimate we are counting the allocation of the input variables,\
      \ while in the challenge score we\n  are not counting them, since they are allocated\
      \ by the caller.\n"
secp256k1-scalar-mul:
  type: public
  instance: Secp256k1ScalarMul
  config: configs/Secp256k1ScalarMul.json
  cost: Challenge/Instances/Secp256k1ScalarMul/Cost.lean
  namespace: Solution.Secp256k1ScalarMul
  files:
  - configs/Secp256k1ScalarMul.json
  - Challenge/Specs/Secp256k1.lean
  - Challenge/Utils/CostR1CS.lean
  - Challenge/Instances/Secp256k1ScalarMul
  - Solution/Secp256k1ScalarMul
  - Tests/Secp256k1.lean
  content:
    title: secp256k1 Scalar Multiplication
    description: "# secp256k1 Variable-Base Scalar Multiplication\nYour goal is to\
      \ build a circuit that multiplies a point on the secp256k1\ncurve (`y\xB2 =\
      \ x\xB3 + 7` over the 256-bit prime field) by a scalar given as\na sequence\
      \ of bits.\n\n## Interface\n\n```lean\nstructure Input (F : Type) where\n  bits\
      \ : Vector F 256   -- scalar bits, most significant first\n  px : Vector F 32\
      \      -- base-point x, big-endian bytes\n  py : Vector F 32      -- base-point\
      \ y, big-endian bytes\n\nstructure Output (F : Type) where\n  x : Vector F 32\
      \       -- result x, big-endian bytes (0 when isInf = 1)\n  y : Vector F 32\
      \       -- result y, big-endian bytes (0 when isInf = 1)\n  isInf : F      \
      \       -- boolean point-at-infinity flag\n```\n\nThe input assumptions say\
      \ the scalar entries are bits, the coordinates\nare canonical big-endian byte\
      \ strings (`< p`), and the base point lies\non the curve. These are assumed\
      \ to be checked by the caller and do not\nhave to be enforced by the circuit.\n\
      \nThe circuit must guarantee that the output is the **well-formed, unique**\n\
      byte encoding of the true multiple `[k]P` under the complete group law\n(`Specs.Secp256k1ScalarMul.Spec`):\
      \ output entries are bytes, the\nencoded coordinates are canonical, the flag\
      \ is boolean, and the\ncoordinate bytes are zero when the result is the point\
      \ at infinity;\nwhich happens exactly when `k \u2261 0 (mod n)`. The relation\
      \ is total, so\nevery scalar bit sequence (any value, including `k \u2265 n`)\
      \ must be\nhandled.\n\n```lean\ndef Spec (input : Input (F circomPrime)) (output\
      \ : Output (F circomPrime))\n    (_data : ProverData (F circomPrime)) : Prop\
      \ :=\n  OutputValid output \u2227\n  Specs.Secp256k1ScalarMul.Spec (input.bits.map\
      \ ZMod.val)\n    { x := decodeCoord input.px, y := decodeCoord input.py }\n\
      \    (decodeOutput output)\n```\n"
    tags:
    - elliptic-curve
    - secp256k1
  baseline:
    allocations: 8182144
    constraints: 8279944
  comparison_points:
  - name: gnark (R1CS)
    score: 294879
    caveats: "Consensys gnark v0.15.0 `sw_emulated.ScalarMul` for secp256k1 emulated\n\
      over the BN254 scalar field, compiled to R1CS with `r1cs.NewBuilder`\n(the same\
      \ rank-1 constraint system Groth16 uses): 117350 constraints and\n177529 internal\
      \ variables, so score = allocations + constraints = 294879.\n\n`ScalarMul` uses\
      \ the GLV + fake-GLV endomorphism method, and this is its\n*complete*-arithmetic\
      \ cost (the default), which handles the exceptional\ncases (point at infinity,\
      \ P = \xB1Q), the fair match to this challenge's\ntotal spec. The *incomplete*\
      \ variant (`WithIncompleteArithmetic`, faster\nbut undefined on the exceptional\
      \ set) is 56221 constraints; that is the\n~60k figure sometimes quoted, but\
      \ it does not compute the total relation.\n\nInterface differences make this\
      \ a lower bound on a full solution:\n- gnark takes the scalar and point as emulated\
      \ field elements, while the\n  challenge takes the scalar as 256 bits and the\
      \ point as big-endian\n  bytes and must decode/encode them (extra range checks\
      \ + recomposition).\n- gnark exposes no point-at-infinity flag and does not\
      \ enforce a\n  canonical, unique byte encoding of the output; the challenge\
      \ does both.\n- \"allocations\" is gnark's internal-variable count (interface\
      \ inputs\n  excluded, as in the challenge score).\n"
  - name: circom-ecdsa (R1CS)
    score: 2790986
    caveats: '0xPARC circom-ecdsa `Secp256k1ScalarMult(64, 4)` (n=64-bit, k=4-limb

      bigint emulation of secp256k1 F_p), compiled with circom 2.2.3 using

      --O2: 1399441 non-linear (R1CS) constraints and 1391545 wires, so score =

      1391545 + 1399441 = 2790986. This is the classic Circom/Groth16 baseline

      (windowed double-and-add, no endomorphism); the gnark GLV figure above is

      ~9x smaller.


      Same interface differences as the gnark entry: the scalar is 4 x 64-bit

      limbs (not 256 bits), the output is 2 x 4 limbs (not big-endian bytes),

      and there is no infinity flag or canonical-encoding enforcement.

      "allocations" here is circom''s wire count (which includes the handful of

      interface inputs); "constraints" is the non-linear (R1CS) count.

      '
secp256k1-fixed-base-scalar-mul:
  type: public
  instance: Secp256k1ScalarMulFixedBase
  config: configs/Secp256k1ScalarMulFixedBase.json
  cost: Challenge/Instances/Secp256k1ScalarMulFixedBase/Cost.lean
  namespace: Solution.Secp256k1ScalarMulFixedBase
  files:
  - configs/Secp256k1ScalarMulFixedBase.json
  - Challenge/Specs/Secp256k1.lean
  - Challenge/Utils/CostR1CS.lean
  - Challenge/Instances/Secp256k1ScalarMulFixedBase
  - Solution/Secp256k1ScalarMulFixedBase
  - Tests/Secp256k1.lean
  content:
    title: secp256k1 Fixed-Base Scalar Multiplication
    description: "# secp256k1 Fixed-Base Scalar Multiplication\nYour goal is to build\
      \ a circuit that multiplies the **fixed** secp256k1\ngenerator `G` (the standard\
      \ base point of `y\xB2 = x\xB3 + 7` over the 256-bit\nprime field) by a scalar\
      \ given as a sequence of bits.\n\n## Interface\n\n```lean\nstructure Input (F\
      \ : Type) where\n  bits : Vector F 256   -- scalar bits, most significant first\n\
      \nstructure Output (F : Type) where\n  x : Vector F 32       -- result x, big-endian\
      \ bytes (0 when isInf = 1)\n  y : Vector F 32       -- result y, big-endian\
      \ bytes (0 when isInf = 1)\n  isInf : F             -- boolean point-at-infinity\
      \ flag\n```\n\nThe base point is the compile-time constant generator `G`, so\
      \ it is not\npart of the input. The only input assumption is that the scalar\
      \ entries\nare bits; this is assumed to be checked by the caller and does not\
      \ have\nto be enforced by the circuit.\n\nThe circuit must guarantee that the\
      \ output is the **well-formed, unique**\nbyte encoding of the true multiple\
      \ `[k]G` under the complete group law\n(`Specs.Secp256k1ScalarMulFixedBase.Spec`):\
      \ output entries are\nbytes, the encoded coordinates are canonical, the flag\
      \ is boolean, and\nthe coordinate bytes are zero when the result is the point\
      \ at infinity;\nwhich happens exactly when `k \u2261 0 (mod n)`. The relation\
      \ is total, so\nevery scalar bit sequence (any value, including `k \u2265 n`)\
      \ must be\nhandled.\n\nBecause the base point is fixed, the circuit has room\
      \ to be far cheaper\nthan the variable-base version (e.g. precomputed multiples\
      \ of `G`); the\nbaseline reuses the generic double-and-add gadget and does not\
      \ exploit\nthis.\n\n```lean\ndef Spec (input : Input (F circomPrime)) (output\
      \ : Output (F circomPrime))\n    (_data : ProverData (F circomPrime)) : Prop\
      \ :=\n  OutputValid output \u2227\n  Specs.Secp256k1ScalarMulFixedBase.Spec\
      \ (input.bits.map ZMod.val)\n    (decodeOutput output)\n```\n"
    tags:
    - elliptic-curve
    - secp256k1
  baseline:
    allocations: 8182144
    constraints: 8279944
  comparison_points:
  - name: circom-ecdsa (R1CS)
    score: 190360
    caveats: "0xPARC circom-ecdsa `ECDSAPrivToPub(64, 4)`: fixed-base [k]G with\n\
      precomputed multiples of G (stride-8 windowing), n=64/k=4 bigint\nemulation,\
      \ compiled with circom 2.2.3 using --O2: 95444 non-linear\n(R1CS) constraints\
      \ and 94916 wires, so score = 94916 + 95444 = 190360.\nFor the fixed-base case\
      \ circom's precomputed-table approach beats gnark's\nnon-native GLV path (below).\n\
      \nInterface differences make this a lower bound on a full solution:\n- Scalar\
      \ as 4 x 64-bit limbs, not 256 bits; output as 2 x 4 limbs, not\n  big-endian\
      \ bytes; the challenge additionally decomposes the bits and\n  encodes the bytes.\n\
      - No point-at-infinity flag and no canonical output-encoding enforcement;\n\
      \  `ECDSAPrivToPub` assumes a non-zero scalar and a valid affine result.\n-\
      \ \"allocations\" is circom's wire count (interface inputs included);\n  \"\
      constraints\" is the non-linear (R1CS) count.\n"
  - name: gnark (R1CS)
    score: 292542
    caveats: 'Consensys gnark v0.15.0 `sw_emulated.ScalarMulBase` (fixed generator,

      complete arithmetic), compiled to R1CS: 116402 constraints and 176140

      internal variables, score 292542. For emulated curves gnark''s fixed-base

      path is only marginally cheaper than variable-base (both ~117k

      constraints): the generator multiples are constants but the arithmetic is

      still non-native, so circom-ecdsa''s precomputed table (above) wins for

      fixed-base. Same interface caveats as the gnark variable-base entry

      (emulated-field inputs, no infinity flag, no canonical byte encoding).

