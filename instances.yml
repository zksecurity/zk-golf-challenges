  content:
    title: RSA Signature Verification
    description: "# RSA-4096 PKCS#1 v1.5 SHA-256 Verification\nYour goal is to build\
      \ a circuit that verifies an RSASSA-PKCS1-v1_5\nsignature over a SHA-256 digest,\
      \ using a 4096-bit RSA modulus and public\nexponent `65537`.\n\n## Interface\n\
      \n```lean\n@[reducible] def modulusBytesLen : \u2115 :=\n  Specs.RSASSAPKCS1v15_SHA256_4096_65537.modulusBytesLen\n\
      \n@[reducible] def digestBytesLen : \u2115 :=\n  Specs.RSASSAPKCS1v15.HashAlgorithm.sha256.digestLength\n\
      \nstructure Input (F : Type) where\n  modulus : Vector F modulusBytesLen\n \
      \ digest : Vector F digestBytesLen\n  signature : Vector F modulusBytesLen\n\
      \nabbrev Output : TypeMap := unit\n```\n\nThe public inputs are byte strings\
      \ encoded as field elements: the\nbig-endian RSA modulus `N`, the 32-byte SHA-256\
      \ digest, and the big-endian\nRSA signature `S`.\n\nThe assumptions say that\
      \ all three vectors are valid byte arrays, and that\nthe representative integer\
      \ of the modulus has exactly 4096 bits.\nThese properties are assumed to be\
      \ checked elsewhere (e.g., by the caller\nof the circuit) and do not have to\
      \ be enforced by the circuit itself.\n\n```lean\ndef Assumptions {modulusBytesLen\
      \ : \u2115} (alg : HashAlgorithm)\n    (n : Vector \u2115 modulusBytesLen)\n\
      \    (h : Vector \u2115 alg.digestLength)\n    (signature : Vector \u2115 modulusBytesLen)\
      \ : Prop :=\n  IsOctetString n \u2227\n  IsOctetString h \u2227\n  IsOctetString\
      \ signature \u2227\n  HasBitSize (os2ip n) (modulusBytesLen * 8)\n```\n\nThe\
      \ circuit must guarantee that RFC 8017 signature verification succeeds:\nrecover\
      \ `S^65537 mod N`, encode it as a 4096-bit octet string, and compare\nit with\
      \ the EMSA-PKCS1-v1_5 encoding of the supplied SHA-256 digest.\n\n```lean\n\
      def verifySignature {modulusBytesLen : \u2115} (alg : HashAlgorithm) (e : \u2115\
      )\n    (n : Vector \u2115 modulusBytesLen)\n    (h : Vector \u2115 alg.digestLength)\n\
      \    (signature : Vector \u2115 modulusBytesLen) : Bool :=\n  let n := os2ip\
      \ n\n  let signature := os2ip signature\n  let recovered := rsavp1? n e signature\n\
      \  let expected := emsaPkcs1v15Encode? alg h modulusBytesLen\n  match recovered,\
      \ expected with\n  | some r, some e => i2osp r modulusBytesLen == some e\n \
      \ | _, _ => false\n```\n\nThe concrete instance fixes SHA-256 as the hash algorithm\
      \ and `65537` as\nthe public exponent.\n\n```lean\n@[reducible] def publicExponent\
      \ := 65537\n\ndef Spec :=\n  Specs.RSASSAPKCS1v15.Spec\n    (modulusBytesLen\
      \ := modulusBytesLen)\n    algorithm\n    publicExponent\n```\n"
    tags:
    - rsa
    - signature
  baseline:
    allocations: 412130
    constraints: 415006
