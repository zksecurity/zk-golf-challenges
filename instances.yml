  content:
    title: SHA-256
    description: "# SHA-256 Digest\nYour goal is to build a circuit that accepts a\
      \ message of up to 256 bytes and\noutputs its SHA-256 digest.\n\n## Interface\n\
      \n```lean\n@[reducible] def inputBufferLen : \u2115 := 256\n\nstructure Input\
      \ (F : Type) where\n  message : Vector F inputBufferLen\n  messageLen : F\n\n\
      structure Output (F : Type) where\n  digest : Vector F 8\n```\n\nThe input is\
      \ a fixed-size buffer of field elements, together with the\nlength of the message\
      \ prefix that should be hashed. The SHA-256 must be computed\non the input slice\
      \ starting from position 0 with size `messageLen`.\nThe output is an array of\
      \ 8 field elements, each representing one\n32-bit word of the digest.\n\nThe\
      \ input assumptions say that every element of the message buffer\nis a byte\
      \ and that `messageLen` is strictly less than the buffer length.\nThese properties\
      \ are assumed to be checked elsewhere (e.g., by the caller of the\ncircuit)\
      \ and do not have to be enforced by the circuit itself.\n\n```lean\ndef Assumptions\
      \ {bufferLen : \u2115}\n    (input : Vector \u2115 bufferLen)\n    (len : \u2115\
      ) : Prop :=\n  IsByteArray input \u2227 len < bufferLen\n```\n\nThe circuit\
      \ must guarantee that the output is the SHA-256 hash of the\nfirst `messageLen`\
      \ bytes of the input buffer.\n\n```lean\ndef Spec {bufferLen : \u2115}\n   \
      \ (input : Vector \u2115 bufferLen) (len : \u2115)\n    (output : Vector \u2115\
      \ 8) : Prop :=\n  if h : len \u2264 bufferLen then\n    let truncated := truncate\
      \ input len h\n    output = sha256 truncated\n  else\n    False\n```\n"
    tags:
    - hash
    - sha256
  baseline:
    allocations: 204216
    constraints: 207538
