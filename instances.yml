assert-bytes:
  type: public
  instance: AssertBytes
  config: configs/AssertBytes.json
  cost: Challenge/Instances/AssertBytes/Cost.lean
  namespace: Solution.AssertBytes
  files:
  - configs/AssertBytes.json
