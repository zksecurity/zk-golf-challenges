      \ that the input message and the modulus are normalized\n  big integers, while\
      \ the challenge assumes that they are valid byte arrays and does not enforce\
      \ it.\n- In this estimate we are counting the allocation of the input variables,\
      \ while in the challenge score we\n  are not counting them, since they are allocated\
      \ by the caller.\n"
